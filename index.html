<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hermes Uplink</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="512x512" href="assets/icon.png" />
<link rel="apple-touch-icon" href="assets/icon.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0d1117" />
<style>
  :root{
    --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --accent:#f0a500; --accent2:#58a6ff;
    --green:#3fb950; --red:#f85149; --purple:#bc8cff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100vh; height:100dvh}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:var(--bg); color:var(--text); display:flex; height:100vh; height:100dvh; overflow:hidden}
  a{color:var(--accent2)}
  button{font:inherit; color:var(--text); background:var(--bg3); border:1px solid var(--border);
         border-radius:8px; padding:6px 10px; cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent); color:#1a1300; border-color:var(--accent); font-weight:600}
  input,textarea{font:inherit; color:var(--text); background:var(--bg); border:1px solid var(--border);
         border-radius:8px; padding:8px; width:100%}
  .hidden{display:none !important}

  /* layout */
  #sidebar{width:280px; min-width:280px; background:var(--bg2); border-right:1px solid var(--border);
           display:flex; flex-direction:column}
  #main{flex:1; display:flex; flex-direction:column; min-width:0}
  #right{width:300px; min-width:300px; background:var(--bg2); border-left:1px solid var(--border);
         display:flex; flex-direction:column; overflow:auto}
  #right.collapsed{display:none}

  .bar{display:flex; align-items:center; gap:8px; padding:10px; border-bottom:1px solid var(--border)}
  .bar h1{font-size:15px; margin:0; flex:1; letter-spacing:.3px}
  .toolbtn{background:transparent; border:1px solid var(--border); width:40px; height:40px; padding:0; flex:none}

  #search{padding:8px 10px}
  #sessionList{flex:1; overflow:auto; padding:0 8px 8px}
  .sess{padding:9px 10px; border-radius:8px; cursor:pointer; border:1px solid transparent; margin-bottom:4px}
  .sess:hover{background:var(--bg3)}
  .sess.active{background:var(--bg3); border-color:var(--accent)}
  .sess .t{font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .sess .m{font-size:11px; color:var(--muted); margin-top:2px; display:flex; gap:6px; flex-wrap:wrap}
  .badge{font-size:10px; padding:1px 6px; border-radius:10px; background:var(--bg); border:1px solid var(--border); color:var(--muted)}
  .badge.live{color:var(--green); border-color:var(--green)}

  #thread{flex:1; overflow:auto; padding:14px; display:flex; flex-direction:column; gap:12px}
  .msg{border-radius:10px; padding:10px 12px; max-width:92%; line-height:1.5}
  .msg.user{align-self:flex-end; background:#1f6feb22; border:1px solid #1f6feb55}
  .msg.assistant{align-self:flex-start; background:var(--bg2); border:1px solid var(--border)}
  .msg.system{align-self:flex-start; background:#6e76811a; color:var(--muted); font-size:12px; border:1px dashed var(--border)}
  .msg.tool{align-self:flex-start; background:#21262d99; border:1px solid var(--border); font-size:12px; width:92%}
  .msg.tool[open] .hdr{border-bottom:1px solid var(--border); padding-bottom:6px; margin-bottom:6px}
  .msg .role{font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:4px}
  .msg pre{background:#0b0f14; border:1px solid var(--border); border-radius:6px; padding:8px; overflow:auto; font-size:12px}
  .tool .hdr{display:flex; align-items:center; gap:6px; font-weight:600; color:var(--purple); cursor:pointer; user-select:none; list-style:none; outline:none}
  .tool .hdr::-webkit-details-marker{display:none}
  .tool .hdr::after{content:"▼"; font-size:10px; margin-left:auto; color:var(--muted); transition:transform 0.2s}
  .msg.tool[open] .hdr::after{transform:rotate(180deg)}
  .tool .body{color:var(--text); white-space:pre-wrap; word-break:break-word; max-height:min(400px, 60vh); overflow-y:auto}
  .tool-collapse-btn{display:block; width:100%; margin-top:8px; background:transparent; border:1px solid var(--border); color:var(--muted); font-size:11px; padding:4px; border-radius:6px; cursor:pointer; text-align:center}
  .tool-collapse-btn:hover{background:var(--bg3); color:var(--text); border-color:var(--muted)}

  /* message actions (edit / restore / rerun) */
  .msgActions{display:flex; gap:6px; margin-top:8px; justify-content:flex-end}
  .msgActions button{width:34px; height:34px; padding:0; border-radius:8px; font-size:15px; line-height:1; background:var(--bg3); border-color:transparent; opacity:0.8}
  .msgActions button:hover{opacity:1; border-color:var(--accent)}
  @media (pointer:fine){ 
    .msgActions{opacity:0; transition:opacity 0.2s; pointer-events:none}
    .msg.user:hover .msgActions{opacity:1; pointer-events:auto}
  }
  .editArea{width:100%; min-height:64px; resize:vertical; margin-top:6px}
  .editBar{display:flex; gap:6px; margin-top:6px; justify-content:flex-end}

  /* rendered markdown inside .body */
  .body{line-height:1.55; overflow-wrap:anywhere}
  .body > :first-child{margin-top:0}
  .body > :last-child{margin-bottom:0}
  .body p{margin:0 0 10px}
  .body ul,.body ol{margin:0 0 10px; padding-left:22px}
  .body li{margin:2px 0}
  .body h1,.body h2,.body h3,.body h4{margin:14px 0 8px; line-height:1.3}
  .body h1{font-size:1.3em} .body h2{font-size:1.18em} .body h3{font-size:1.06em}
  .body a{color:var(--accent2); text-decoration:underline}
  .body code{background:#0b0f14; border:1px solid var(--border); border-radius:4px; padding:1px 5px; font-size:.9em; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .body pre{background:#0b0f14; border:1px solid var(--border); border-radius:8px; padding:12px; overflow:auto; margin:0 0 10px}
  .body pre code{background:none; border:none; padding:0; font-size:.88em; white-space:pre}
  .body blockquote{margin:0 0 10px; padding:4px 12px; border-left:3px solid var(--border); color:var(--muted)}
  .body table{border-collapse:collapse; margin:0 0 10px; width:100%; font-size:.92em; display:block; overflow:auto}
  .body th,.body td{border:1px solid var(--border); padding:5px 9px; text-align:left}
  .body th{background:var(--bg3); font-weight:600}
  .body hr{border:none; border-top:1px solid var(--border); margin:12px 0}

  /* Hermes meta/context callouts (e.g. [CONTEXT COMPACTION — ...]) */
  .sysnote{margin:0 0 10px; border:1px dashed var(--border); border-radius:8px; background:#6e76811a; font-size:.9em}
  .sysnote-h{font-weight:600; color:var(--muted); padding:5px 10px; font-size:.82em; text-transform:uppercase; letter-spacing:.4px}
  .sysnote-b{padding:0 10px 8px; color:var(--muted)}
  .sysnote-b > :last-child{margin-bottom:0}

  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block}
  .dot.run{background:var(--accent); animation:pulse 1s infinite}
  .dot.done{background:var(--green)}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

  /* composer + context/send ring */
  #composer{display:flex; gap:8px; padding:10px; border-top:1px solid var(--border); align-items:flex-end}
  #composer textarea{min-height:44px; max-height:160px; resize:vertical}
  #ring{width:44px; height:44px; border:none; border-radius:50%; cursor:pointer; position:relative; flex:none; padding:0;
        background:conic-gradient(var(--ringFill,var(--muted)) var(--pct,0%), var(--border) 0)}
  #ring::before{content:""; position:absolute; inset:5px; border-radius:50%; background:var(--bg)}
  #ring #ringIcon{position:relative; z-index:1; display:block; text-align:center; line-height:34px; font-size:15px; color:var(--text)}
  #ring:disabled{opacity:.45; cursor:default}
  #ring.busy{outline:2px solid var(--red); outline-offset:2px}
  #ring.busy #ringIcon{color:var(--red)}

  /* right panel */
  #right .tab{display:flex; border-bottom:1px solid var(--border)}
  #right .tab button{flex:1; border-radius:0; border:none; border-bottom:2px solid transparent; background:transparent}
  #right .tab button.on{border-bottom-color:var(--accent); color:var(--accent)}
  .list{padding:10px; display:flex; flex-direction:column; gap:8px}
  .card{border:1px solid var(--border); border-radius:8px; padding:8px 10px; background:var(--bg)}
  .card .n{font-weight:600; font-size:13px}
  .card .d{font-size:11px; color:var(--muted); margin-top:3px}
  .card .tools{font-size:10px; color:var(--accent2); margin-top:4px; word-break:break-word}

  /* modal */
  .modal{position:fixed; inset:0; background:#000a; display:flex; align-items:center; justify-content:center; z-index:50}
  .modal .box{background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:18px; width:min(420px,92vw)}
  .modal label{display:block; font-size:12px; color:var(--muted); margin:12px 0 4px}
  .diag{margin-top:12px; font-size:11px; color:var(--muted); white-space:pre-wrap}

  /* On desktop the sidebar is always visible, so the hamburger (mobile-only drawer
     toggle) is a no-op there — hide it to avoid a dead control. */
  @media (min-width:1024px){ #menuBtn{ display:none } }

  /* mobile / tablet: drawers instead of the squished 3-column band */
  @media (max-width:1023px){
    #sidebar{position:fixed; top:0; left:0; z-index:40; height:100%; height:100dvh;
             padding-top:env(safe-area-inset-top); transform:translateX(-100%); transition:.2s}
    #sidebar.open{transform:none}
    #right{position:fixed; top:0; right:0; z-index:40; height:100%; height:100dvh;
           padding-top:env(safe-area-inset-top); transform:translateX(100%); transition:.2s}
    #right.open{transform:none}
    .scrim{position:fixed; inset:0; background:#0008; z-index:35}
    #main > .bar{ padding-top:calc(10px + env(safe-area-inset-top)) }
    #composer{ padding-bottom:calc(10px + env(safe-area-inset-bottom)) }
  }

  /* coarse-pointer (phone/tablet finger): bigger text, no resize handle */
  @media (pointer:coarse){
    body{font-size:16px}
    .sess .t{font-size:15px}
    #composer textarea{resize:none}
  }
</style>
</head>
<body>
  <div id="sidebar">
    <div class="bar">
      <h1>Hermes Uplink</h1>
      <button class="toolbtn" id="settingsBtn" title="Settings">&#9881;</button>
    </div>
    <div id="search"><input id="searchInput" placeholder="Search sessions…" /></div>
    <div class="bar" style="border:none;padding:0 10px 6px">
      <button class="primary" id="newBtn" style="flex:1">+ New chat</button>
    </div>
    <div id="sessionList"></div>
  </div>

  <div id="main">
    <div class="bar">
      <button class="toolbtn" id="menuBtn" title="Sessions">&#9776;</button>
      <button class="toolbtn" id="infoBtn" title="Capabilities">&#9432;</button>
      <div style="flex:1;font-size:13px;color:var(--muted);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="activeTitle">No session — start or pick one</div>
      <span id="statusDot" class="dot" title="Connection status"></span>
      <button class="toolbtn" id="refreshBtn" title="Refresh (or just switch to this tab)">&#8635;</button>
      <button class="toolbtn" id="rightBtn" title="Skills / Tools">&#9881;</button>
    </div>
    <div id="thread"><div style="margin:auto;color:var(--muted);text-align:center">
      Pick a session on the left, or start a new chat.<br/>All sessions live on your home desktop.</div></div>
    <div id="composer">
      <textarea id="input" placeholder="Message the agent… (Enter to send, Shift+Enter newline)" enterkeyhint="return"></textarea>
      <button id="ring" title="Send" aria-label="Send">
        <span id="ringIcon">&#9654;</span>
      </button>
    </div>
  </div>

  <div id="right">
    <div class="tab">
      <button id="tabSkills" class="on">Skills</button>
      <button id="tabTools">Toolsets</button>
    </div>
    <div class="list" id="skillsList"></div>
    <div class="list hidden" id="toolsList"></div>
  </div>

  <!-- settings modal -->
  <div class="modal hidden" id="settingsModal">
    <div class="box">
      <h3 style="margin:0 0 4px">Connection</h3>
      <div style="font-size:12px;color:var(--muted)">Leave Server URL empty to use same-origin (proxy mode).</div>
      <label>Server base URL (e.g. https://hermes.example.com or http://127.0.0.1:8642)</label>
      <input id="cfgUrl" placeholder="(same origin)" />
      <label>API key (Bearer) — only needed in direct mode</label>
      <input id="cfgKey" type="password" placeholder="(injected by proxy in same-origin mode)" />
      <div class="diag" id="diag"></div>
       <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
         <button id="diagBtn">Test</button>
         <button id="logoutBtn">Log out</button>
         <button id="cfgCancel">Cancel</button>
         <button class="primary" id="cfgSave">Save</button>
       </div>
    </div>
  </div>

  <div class="scrim hidden" id="scrim"></div>

  <!-- passphrase gate (one-time per browser session) -->
  <div class="modal hidden" id="authModal">
    <div class="box">
      <h3 style="margin:0 0 4px">Hermes Uplink</h3>
      <div style="font-size:12px;color:var(--muted)">Enter the passphrase shown on your desktop launcher.</div>
      <label>Passphrase</label>
      <input id="authInput" type="password" placeholder="••••••••" autocomplete="current-password" />
      <div class="diag" id="authDiag"></div>
      <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
        <button class="primary" id="authSubmit">Connect</button>
      </div>
    </div>
  </div>

<!-- vendored offline markdown renderer (no CDN); from marked v17 (MIT) -->
<script src="vendor/marked.umd.js"></script>
<script>
const LS_KEY = "hermes-uplink-cfg";
let cfg = loadCfg();
let activeId = null;
let streaming = false;
let currentAbort = null;
const FINE_POINTER = window.matchMedia("(pointer: fine)").matches;

function loadCfg(){
  try{
    const value = JSON.parse(localStorage.getItem(LS_KEY));
    if(!value || typeof value !== "object") return {};
    delete value.token;
    return value;
  }catch{ return {} }
}
function saveCfg(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(cfg)); }catch{}
}
function base(){ return (cfg.url||"").replace(/\/+$/,"") }
function externalMode(){
  if(!base()) return false;
  try{ return new URL(base(), window.location.origin).origin !== window.location.origin; }
  catch{ return true; }
}

async function api(path, opts={}){
  const url = base() + path;
  const h = Object.assign({}, opts.headers||{});
  if(cfg.key && externalMode()) h["Authorization"] = "Bearer " + cfg.key;
  return fetch(url, Object.assign({}, opts, {headers:h, credentials:"same-origin"}));
}

/* ---------- auth gate ---------- */
function showAuth(message){
  const modal = document.getElementById("authModal");
  document.getElementById("authDiag").textContent = message || "";
  modal.classList.remove("hidden");
  document.getElementById("authInput").focus();
}
async function ensureAuth(){
  if(new URLSearchParams(window.location.search).has("t")){
    const newUrl = window.location.pathname + window.location.hash;
    window.history.replaceState({}, document.title, newUrl);
  }
  try{
    const r = await api("/api/sessions?limit=1");
    if(r.status !== 401) return true;
    if(externalMode()){
      alert("External API unauthorized. Check the API key in Settings.");
      return true;
    }
  }catch(e){
    showAuth("Cannot reach the Uplink proxy. Start it, then try again.");
    return false;
  }
  showAuth("Enter the passphrase shown on your desktop launcher.");
  return false;
}
async function submitAuth(){
  const v = document.getElementById("authInput").value.trim();
  if(!v){ document.getElementById("authDiag").textContent = "Enter the passphrase."; return; }
  const button = document.getElementById("authSubmit");
  button.disabled = true;
  try{
    const r = await fetch(base()+"/__auth", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({passphrase:v}),
      credentials:"same-origin"
    });
    if(r.status===204){
      document.getElementById("authInput").value = "";
      document.getElementById("authModal").classList.add("hidden");
      boot();
    }else if(r.status===429){
      document.getElementById("authDiag").textContent = "Too many attempts. Wait briefly and try again.";
    }else if(r.status===401){
      document.getElementById("authDiag").textContent = "Incorrect passphrase.";
    }else{
      document.getElementById("authDiag").textContent = "Authentication service unavailable.";
    }
  }catch(e){
    document.getElementById("authDiag").textContent = "Cannot reach the Uplink proxy.";
  }finally{
    button.disabled = false;
  }
}
document.getElementById("authSubmit").onclick = submitAuth;
document.getElementById("authInput").addEventListener("keydown", e=>{ if(e.key==="Enter") submitAuth(); });
async function logout(){
  try{ await fetch(base()+"/__logout", {method:"POST", credentials:"same-origin"}); }catch{}
  window.location.reload();
}

/* ---------- status dot + silent retry ---------- */
let retryTimer = null;
function setStatus(state){
  const d = document.getElementById("statusDot");
  d.className = "dot " + (state==="ok"?"done":state==="bad"?"run":"");
  d.title = state==="ok" ? "Connected" : state==="bad" ? "Reconnecting…" : "Connecting…";
}
async function probe(){
  try{
    const r = await api("/health");
    setStatus(r.ok ? "ok" : "bad");
    if(!r.ok) scheduleProbe(); else clearTimeout(retryTimer);
  }catch{ setStatus("bad"); scheduleProbe(); }
}
function scheduleProbe(){
  clearTimeout(retryTimer);
  retryTimer = setTimeout(probe, 8000);
}

/* ---------- context ring ---------- */
function num(x){ const n = Number(x); return Number.isFinite(n) ? n : 0; }
function setContext(used, limit){
  const ring = document.getElementById("ring");
  if(!(limit > 0)){
    ring.style.setProperty("--pct", "0%");
    ring.style.setProperty("--ringFill", "var(--muted)");
    ring.title = "Context usage: unknown";
    return;
  }
  const pct = Math.max(0, Math.min(100, Math.round(used / limit * 100)));
  const fill = pct < 70 ? "var(--green)" : pct < 90 ? "var(--accent)" : "var(--red)";
  ring.style.setProperty("--pct", pct + "%");
  ring.style.setProperty("--ringFill", fill);
  ring.title = `Context: ${used} / ${limit} tokens (${pct}%)`;
}
function applyContextFrom(obj){
  if(!obj || typeof obj !== "object") return;
  const used = num(obj.context_used ?? obj.contextTokens ?? obj.tokens_used ?? obj.used_tokens);
  const limit = num(obj.context_window ?? obj.contextWindow ?? obj.max_tokens ?? obj.context_limit);
  if(limit > 0) setContext(used, limit);
}

/* ---------- ring (send/stop) state ---------- */
function updateRingState(){
  const ring = document.getElementById("ring");
  const icon = document.getElementById("ringIcon");
  if(streaming){
    icon.innerHTML = "&#9632;";            // ■ stop
    ring.classList.add("busy");
    ring.setAttribute("aria-label", "Stop");
    ring.disabled = false;
  }else{
    icon.innerHTML = "&#9654;";            // ▶ send
    ring.classList.remove("busy");
    ring.setAttribute("aria-label", "Send");
    ring.disabled = !document.getElementById("input").value.trim();
  }
}

/* ---------- boot ---------- */
function boot(){
  probe();
  loadSessions();
  updateRingState();
}

/* ---------- manual / on-focus refresh ----------
   We deliberately do NOT run a background poller (battery). Instead we refresh
   whenever the user (a) clicks the refresh button, or (b) returns to this tab /
   focuses the window. With the shared session store, this makes both edge devices
   converge within a second of you actually looking at the app — which matches the
   "switch devices a few times a day" pattern. */
let refreshing = false;
async function refresh(){
  if(refreshing || !activeId) { await loadSessions(); return; }
  refreshing = true;
  const btn = document.getElementById("refreshBtn");
  btn.style.opacity = "0.5";
  try{
    await loadSessions();
    const r = await api("/api/sessions/"+encodeURIComponent(activeId)+"/messages");
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    
    try {
      const detailRes = await api("/api/sessions/"+encodeURIComponent(activeId));
      if(detailRes.ok){
        const detail = await detailRes.json();
        const used = num(detail.input_tokens) + num(detail.output_tokens) + num(detail.cache_read_tokens) + num(detail.cache_write_tokens) + num(detail.reasoning_tokens);
        let limit = 0;
        if(detail.model_config) {
          const cfg = typeof detail.model_config === "string" ? JSON.parse(detail.model_config) : detail.model_config;
          limit = num(cfg.effective_context_length || cfg.context_length || cfg.model_context_length || 0);
        }
        if(limit > 0) { d.context_used = used; d.context_window = limit; }
      }
    }catch(e){}

    applyContextFrom(d);
    const msgs = d.data || d.messages || (Array.isArray(d)?d:[]);
    renderThread(msgs);
  }catch(e){
    setStatus("bad");
  }finally{
    btn.style.opacity = "1";
    refreshing = false;
  }
}
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) refresh(); });
window.addEventListener("focus", ()=> refresh());

/* ---------- sessions ---------- */
async function loadSessions(){
  const el = document.getElementById("sessionList");
  showLoading(el);
  try{
    const r = await api("/api/sessions?limit=200&include_children=true");
    if(r.status === 401){ showAuth("Your browser session expired. Enter the passphrase again."); return; }
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    const sessions = Array.isArray(data) ? data : (data.sessions||data.data||[]);
    renderSessions(sessions);
  }catch(e){ showError(el, "Failed to load sessions."); }
}

function renderSessions(sessions){
  const el = document.getElementById("sessionList");
  const q = (document.getElementById("searchInput").value||"").toLowerCase();
  el.replaceChildren();
  if(!sessions.length){ el.appendChild(messageElement("No sessions.")); return; }
  const sorted = sessions.slice().sort((a,b)=> (b.updated_at||b.last_active||0)-(a.updated_at||a.last_active||0));
  for(const s of sorted){
    const title = String(s.title || s.preview || s.id || "(untitled)");
    const source = String(s.source || "cli");
    if(q && !title.toLowerCase().includes(q) && !source.toLowerCase().includes(q)) continue;
    const div = document.createElement("div");
    div.className = "sess" + (s.id===activeId?" active":"");
    const titleNode = document.createElement("div");
    titleNode.className = "t";
    titleNode.textContent = title;
    const meta = document.createElement("div");
    meta.className = "m";
    meta.appendChild(badgeElement(source, false));
    if(s.active) meta.appendChild(badgeElement("live", true));
    const count = document.createElement("span");
    count.textContent = String(s.message_count || 0) + " msgs";
    meta.appendChild(count);
    const updated = document.createElement("span");
    updated.textContent = relTime(s.updated_at || s.last_active);
    meta.appendChild(updated);
    div.append(titleNode, meta);
    div.onclick = ()=> openSession(s.id, title);
    el.appendChild(div);
  }
}

async function openSession(id, title){
  activeId = id;
  document.getElementById("activeTitle").textContent = title || id;
  try{
    const r = await api("/api/sessions/"+encodeURIComponent(id)+"/messages");
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();

    try {
      const detailRes = await api("/api/sessions/"+encodeURIComponent(id));
      if(detailRes.ok){
        const detail = await detailRes.json();
        const used = num(detail.input_tokens) + num(detail.output_tokens) + num(detail.cache_read_tokens) + num(detail.cache_write_tokens) + num(detail.reasoning_tokens);
        let limit = 0;
        if(detail.model_config) {
          const cfg = typeof detail.model_config === "string" ? JSON.parse(detail.model_config) : detail.model_config;
          limit = num(cfg.effective_context_length || cfg.context_length || cfg.model_context_length || 0);
        }
        if(limit > 0) { data.context_used = used; data.context_window = limit; }
      }
    }catch(e){}

    applyContextFrom(data);
    const msgs = data.data || data.messages || (Array.isArray(data)?data:[]);
    if(activeId === id) renderThread(msgs);
  }catch(e){ if(activeId === id){ renderThread([]); addMsg("system","Could not load history: "+e.message); } }
  if(activeId !== id) return;
  document.querySelectorAll(".sess").forEach(x=>x.classList.remove("active"));
  await loadSessions();
}

async function newSession(){
  try{
    const r = await api("/api/sessions", {method:"POST", headers:{"Content-Type":"application/json"}, body:"{}"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const s = await r.json();
    const id = s.id || (s.session&&s.session.id);
    if(!id) throw new Error("no id in response");
    await loadSessions();
    await openSession(id, "New chat");
  }catch(e){ alert("New chat failed: "+e.message); }
}

/* ---------- chat / streaming ---------- */
function atBottom(){
  const t = document.getElementById("thread");
  return t.scrollHeight - t.scrollTop - t.clientHeight < 48;
}
function maybeAutoscroll(){
  if(atBottom()){ const t = document.getElementById("thread"); t.scrollTop = t.scrollHeight; }
}
const renderTimers = new WeakMap();
function scheduleRender(bubble){
  if(renderTimers.has(bubble)) return;
  const id = setTimeout(()=>{
    renderTimers.delete(bubble);
    if(bubble._raw !== undefined) setBody(bubble.querySelector(".body"), bubble._raw);
  }, 80);
  renderTimers.set(bubble, id);
}
function flushRender(bubble){
  const id = renderTimers.get(bubble);
  if(id){ clearTimeout(id); renderTimers.delete(bubble); }
  if(bubble._raw !== undefined) setBody(bubble.querySelector(".body"), bubble._raw);
}

async function streamTurn(text, sessionId, opts={}){
  if(streaming) return;
  const addUser = opts.addUser !== false;
  const title = document.getElementById("activeTitle").textContent;
  if(addUser) addMsg("user", text);
  streaming = true; updateRingState();
  const bubble = addMsg("assistant", "");
  currentAbort = new AbortController();
  try{
    const r = await api("/api/sessions/"+encodeURIComponent(sessionId)+"/chat/stream", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({input:text}),
      signal: currentAbort.signal
    });
    if(!r.ok) throw new Error("HTTP "+r.status+" "+await r.text());
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while(true){
      const {done,value} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      let separator;
      while((separator = /\r?\n\r?\n/.exec(buf)) !== null){
        const frame = buf.slice(0, separator.index);
        buf = buf.slice(separator.index + separator[0].length);
        handleFrame(frame, bubble);
      }
    }
    if(buf.trim()) handleFrame(buf, bubble);
  }catch(e){
    const body = bubble.querySelector(".body");
    if(e && e.name === "AbortError") body.textContent += "\n[stopped]";
    else body.textContent += "\n[error] " + (e && e.message ? e.message : e);
  }finally{
    streaming = false; currentAbort = null;
    flushRender(bubble);
    updateRingState();
    if(activeId === sessionId) await openSession(sessionId, title);
  }
}

async function send(){
  if(streaming) return;
  const ta = document.getElementById("input");
  const text = ta.value.trim();
  if(!text) return;
  if(!activeId){ await newSession(); }
  if(!activeId) return;
  ta.value = "";
  updateRingState();
  await streamTurn(text, activeId, {addUser:true});
}

function stop(){
  if(currentAbort) currentAbort.abort();
}

function handleFrame(frame, bubble){
  let event="message", data="";
  for(const line of frame.split(/\r?\n/)){
    if(line.startsWith("event:")) event = line.slice(6).trim();
    else if(line.startsWith("data:")){
      let value = line.slice(5);
      if(value.startsWith(" ")) value = value.slice(1);
      data += (data ? "\n" : "") + value;
    }
  }
  let obj=null; try{ obj = JSON.parse(data) }catch{}
  if(event==="assistant.delta"){
    const t = obj && obj.text!=null ? obj.text : data;
    if(!bubble._raw) bubble._raw = "";
    bubble._raw += t;
    scheduleRender(bubble);
    maybeAutoscroll();
  }else if(event==="tool.started"){
    const name = (obj&&obj.name)||"tool";
    addToolCard(name, obj&&obj.call_id, "run", "");
  }else if(event==="tool.completed"){
    const cid = obj&&obj.call_id; const out = obj&&obj.output!=null?obj.output:"";
    updateToolCard(cid, "done", typeof out==="string"?out:JSON.stringify(out,null,2));
  }else if(event==="run.completed"){
    /* server will re-sync history via openSession */
  }
  // fallback: if no structured events, but data is plain text
  if(event==="message" && data && !obj){ bubble.querySelector(".body").textContent += data; }
}

/* ---------- user message actions (edit / restore / rerun) ---------- */
function buildMsgActions(){
  const wrap = document.createElement("div");
  wrap.className = "msgActions";
  const edit = document.createElement("button"); edit.textContent = "✎"; edit.title = "Edit"; edit.dataset.act = "edit";
  const restore = document.createElement("button"); restore.textContent = "↩"; restore.title = "Restore to input"; restore.dataset.act = "restore";
  const rerun = document.createElement("button"); rerun.textContent = "↻"; rerun.title = "Rerun"; rerun.dataset.act = "rerun";
  wrap.append(edit, restore, rerun);
  return wrap;
}
function handleMsgAction(act, text, bubble){
  if(act === "restore"){
    const input = document.getElementById("input");
    input.value = text; input.focus(); updateRingState();
  }else if(act === "rerun"){
    if(activeId && !streaming) streamTurn(text, activeId, {addUser:true});
  }else if(act === "edit"){
    if(activeId) inlineEdit(bubble, text);
  }
}
function inlineEdit(bubble, text){
  const ta = document.createElement("textarea");
  ta.className = "editArea";
  ta.value = text;
  const bar = document.createElement("div");
  bar.className = "editBar";
  const save = document.createElement("button"); save.className = "primary"; save.textContent = "Save";
  const cancel = document.createElement("button"); cancel.textContent = "Cancel";
  bar.append(save, cancel);
  bubble.replaceChildren(ta, bar);
  ta.focus();
  save.onclick = ()=>{
    const v = ta.value.trim();
    if(!v) return;
    
    bubble.replaceChildren();
    const label = document.createElement("div");
    label.className = "role";
    label.textContent = "you";
    const body = document.createElement("div");
    body.className="body";
    setBody(body, text);
    bubble.append(label, body);
    bubble.dataset.text = text;
    bubble.appendChild(buildMsgActions());
    bubble.style.opacity = "0.5";
    bubble.title = "Edited (original preserved in backend context)";
    
    streamTurn(v, activeId, {addUser:true});
  };
  cancel.onclick = ()=>{ openSession(activeId, document.getElementById("activeTitle").textContent); };
}

/* ---------- rendering ---------- */
function addMsg(role, text){
  const t = document.getElementById("thread");
  const d = document.createElement("div");
  const safe = safeRole(role);
  d.className = "msg "+safe;
  const label = document.createElement("div");
  label.className = "role";
  label.textContent = safe === "user" ? "you" : safe;
  const body = document.createElement("div");
  body.className="body";
  d.append(label, body); setBody(body, text);
  if(safe === "user"){
    d.dataset.text = text;
    d.appendChild(buildMsgActions());
  }
  t.appendChild(d); t.scrollTop = t.scrollHeight;
  return d;
}
function renderThread(msgs){
  const t = document.getElementById("thread");
  t.replaceChildren();
  for(const m of msgs){
    const role = safeRole(m.role);
    const c = document.createElement(role === "tool" ? "details" : "div");
    c.className = "msg "+role;
    if(role==="tool"){
      c.appendChild(toolHeader(m.tool_name || m.name || "tool", "done"));
    }else{
      const label = document.createElement("div");
      label.className = "role";
      label.textContent = role === "user" ? "you" : role;
      c.appendChild(label);
    }
    const b=document.createElement("div");
    b.className="body";
    setBody(b, str(m.content));
    c.appendChild(b);
    if(role === "tool") c.appendChild(createCollapseBtn(c));
    if(role === "user"){
      const text = str(m.content);
      c.dataset.text = text;
      c.appendChild(buildMsgActions());
    }
    t.appendChild(c);
  }
  t.scrollTop = t.scrollHeight;
}
function addToolCard(name, cid, state, out){
  const t = document.getElementById("thread");
  const c = document.createElement("details");
  c.className="msg tool"; c.dataset.cid = cid||"";
  if(state === "run") c.open = true;
  c.appendChild(toolHeader(name, state));
  const b=document.createElement("div");
  b.className="body";
  setBody(b, out);
  c.appendChild(b);
  c.appendChild(createCollapseBtn(c));
  t.appendChild(c); t.scrollTop=t.scrollHeight;
}
function updateToolCard(cid, state, out){
  const target = cid ? document.querySelector('.msg.tool[data-cid="'+cid.replace(/"/g, '\\"')+'"]') : null;
  const el = target || (document.querySelectorAll(".msg.tool").length ? document.querySelectorAll(".msg.tool")[document.querySelectorAll(".msg.tool").length-1] : null);
  if(el){
    el.querySelector(".dot").className="dot "+state;
    setBody(el.querySelector(".body"), out);
    if(state === "done") el.open = false;
  }
}

/* ---------- skills / toolsets ---------- */
async function loadSkills(){
  const el=document.getElementById("skillsList"); showLoading(el);
  try{ const r=await api("/v1/skills"); if(!r.ok) throw new Error("HTTP "+r.status); const d=await r.json();
    const arr=Array.isArray(d)?d:(d.data||[]);
    el.replaceChildren();
    for(const s of arr){ const c=document.createElement("div"); c.className="card";
      const name=document.createElement("div"); name.className="n"; name.textContent=String(s.name||s.id||"?");
      const description=document.createElement("div"); description.className="d"; description.textContent=String(s.description||"");
      c.append(name, description);
      el.appendChild(c); }

  }catch(e){ showError(el, "Failed to load skills."); }
}
async function loadTools(){
  const el=document.getElementById("toolsList"); showLoading(el);
  try{ const r=await api("/v1/toolsets"); if(!r.ok) throw new Error("HTTP "+r.status); const d=await r.json();
    const arr=Array.isArray(d)?d:(d.data||[]);
    el.replaceChildren();
    for(const t of arr){ const c=document.createElement("div"); c.className="card";
      const name=document.createElement("div"); name.className="n"; name.textContent=String(t.name||t.label||"?");
      const description=document.createElement("div"); description.className="d";
      description.textContent=String(t.description||"")+(t.enabled!=null?(" · "+(t.enabled?"enabled":"disabled")):"");
      c.append(name, description);

      el.appendChild(c); }

}

/* ---------- diagnostics ---------- */
async function runDiag(){
  const out=document.getElementById("diag"); out.textContent="Testing…";
  let lines=[];
  try{ const r=await api("/health"); lines.push("GET /health → "+r.status+(r.ok?" (ok)":"")); }catch(e){ lines.push("GET /health → "+e.message); }
  try{ const r=await api("/v1/capabilities"); if(!r.ok) throw new Error("HTTP "+r.status); const d=await r.json();
    lines.push("GET /v1/capabilities → "+r.status);
    if(d.features){ const on=Object.entries(d.features).filter(([k,v])=>v).map(([k])=>k).join(", ");
      lines.push("features: "+(on||"(none advertised)")); }
  }catch(e){ lines.push("GET /v1/capabilities → "+e.message); }
  try{ const r=await api("/api/sessions?limit=1"); lines.push("GET /api/sessions → "+r.status); }catch(e){ lines.push("GET /api/sessions → "+e.message); }
  out.textContent = lines.join("\n");
}

/* ---------- event wiring ---------- */
function str(x){
  if(x==null) return "";
  if(typeof x==="string") return x;
  if(Array.isArray(x)) return x.map(str).join("\n");
  if(typeof x==="object"){
    if(x.text) return str(x.text);
    if(x.content) return str(x.content);
    try{ return JSON.stringify(x,null,2); }catch{ return "[unrenderable value]"; }
  }
  return String(x);
}
function escapeHtml(value){
  return String(value==null?"" : value).replace(/[&<>\"']/g, char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));
}
function relTime(ts){
  if(!ts) return "";
  const value = typeof ts === "string" ? Date.parse(ts)/1000 : Number(ts);
  if(!Number.isFinite(value)) return "";
  const d=Date.now()/1000 - value;
  if(d<60) return "just now";
  if(d<3600) return Math.floor(d/60)+"m ago";
  if(d<86400) return Math.floor(d/3600)+"h ago";
  return Math.floor(d/86400)+"d ago";
}
function safeRole(value){
  const role = String(value||"system").toLowerCase();
  return ["assistant","user","tool","system"].includes(role) ? role : "system";
}
function messageElement(text){
  const el=document.createElement("div");
  el.style.color="var(--muted)";
  el.style.padding="10px";
  el.textContent=String(text);
  return el;
}
function showLoading(el){ el.replaceChildren(messageElement("Loading…")); }
function showError(el, text){
  const error=messageElement(text);
  error.style.color="var(--red)";
  el.replaceChildren(error);
}
function badgeElement(text, live){
  const badge=document.createElement("span");
  badge.className="badge"+(live?" live":"");
  badge.textContent=String(text);
  return badge;
}
function toolHeader(name, state){
  const header=document.createElement("summary");
  header.className="hdr";
  const dot=document.createElement("span");
  dot.className="dot "+(state==="done"?"done":"run");
  header.appendChild(dot);
  const label=document.createElement("span");
  label.textContent=String(name||"tool");
  header.appendChild(label);
  return header;
}
function createCollapseBtn(detailsEl){
  const btn = document.createElement("button");
  btn.className = "tool-collapse-btn";
  btn.textContent = "Collapse ▲";
  btn.onclick = (e) => {
    e.preventDefault();
    detailsEl.open = false;
    detailsEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };
  return btn;
}

/* ---------- markdown + Hermes-aware rendering ---------- */
// Hermes wraps meta/context content in bracketed headers, e.g.
//   [CONTEXT COMPACTION — REFERENCE ONLY] ...   [PRIOR CONTEXT — ...]   [SYSTEM ...]
// Render those as de-emphasized "system note" callouts; render the rest as markdown.
const SYSNOTE_RE = /^\[([A-Z][A-Z0-9 _\-–—]+)(?:[ —–]+(.*?))?\]/;
function splitSysNotes(text){
  const lines = text.split("\n");
  const out = []; let i = 0;
  while(i < lines.length){
    const m = lines[i].match(SYSNOTE_RE);
    if(m && lines[i].startsWith("[")){
      const label = m[1]; const sub = m[2]||"";
      const after = lines[i].slice(m[0].length).replace(/^\s*/, "");
      const bodyLines = []; if(after) bodyLines.push(after); let j = i+1;
      while(j < lines.length){
        const ln = lines[j];
        if(ln.trim()===""){
          let k=j+1; while(k<lines.length && lines[k].trim()==="") k++;
          if(k<lines.length && lines[k].match(SYSNOTE_RE) && lines[k].startsWith("[")) break;
          bodyLines.push(ln); j++; continue;
        }
        if(ln.match(SYSNOTE_RE) && ln.startsWith("[")) break;
        bodyLines.push(ln); j++;
      }
      out.push({type:"note", label, sub, body: bodyLines.join("\n").trim()});
      i = j;
    } else {
      const md = [];
      while(i < lines.length){
        const ln = lines[i];
        if(ln.match(SYSNOTE_RE) && ln.startsWith("[")) break;
        md.push(ln); i++;
      }
      if(md.join("\n").trim()) out.push({type:"md", text: md.join("\n")});
    }
  }
  return out;
}
function renderMarkdown(text){
  if(text==null) return "";
  const blocks = splitSysNotes(String(text));
  let html = "";
  for(const b of blocks){
    if(b.type==="note"){
      const body = b.body ? marked.parse(b.body, {breaks:true, gfm:true}) : "";
      const head = escapeHtml((b.label||"note") + (b.sub? " — "+b.sub : ""));
      html += "<div class='sysnote'><div class='sysnote-h'>"+head+"</div>"+(body?"<div class='sysnote-b'>"+body+"</div>":"")+"</div>";
    }else{
      html += marked.parse(b.text, {breaks:true, gfm:true});
    }
  }
  return html;
}
function safeHref(value){
  const raw=String(value||"").trim();
  if(!raw) return null;
  try{
    const url=new URL(raw, document.baseURI);
    if(["http:","https:","mailto:"].includes(url.protocol)) return url.href;
  }catch{}
  return null;
}
function secureHtml(html){
  return String(html||"").replace(/<a\s+([^>]*?)href=(["'])(.*?)\2([^>]*)>/gi, (match, before, quote, url, after) => {
    const safe = safeHref(url);
    if(!safe) return `<a ${before} ${after}>`;
    return `<a ${before}href="${safe}" rel="noreferrer noopener"${after}>`;
  });
}
function setBody(el, text){
  const safeText = String(text).replace(/<(?=[a-zA-Z\/!\?])/gi, "&lt;");
  el.innerHTML = secureHtml(renderMarkdown(safeText));
}

/* ---------- helpers ---------- */
document.getElementById("ring").onclick = ()=>{ if(streaming) stop(); else send(); };
document.getElementById("input").addEventListener("keydown", e=>{
  if(e.key === "Enter"){

  }
});

document.getElementById("settingsBtn").onclick = ()=>{ document.getElementById("settingsModal").classList.remove("hidden"); document.getElementById("cfgUrl").value=cfg.url||""; document.getElementById("cfgKey").value=cfg.key||""; runDiag(); };
document.getElementById("cfgCancel").onclick = ()=> document.getElementById("settingsModal").classList.add("hidden");
document.getElementById("cfgSave").onclick = ()=>{ cfg.url=document.getElementById("cfgUrl").value.trim(); cfg.key=document.getElementById("cfgKey").value.trim(); saveCfg(); document.getElementById("settingsModal").classList.add("hidden"); loadSessions(); };

document.getElementById("logoutBtn").onclick = logout;
