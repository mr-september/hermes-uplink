name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check repository hygiene
        shell: pwsh
        run: |
          $legacyTerms = @(
            ('cloud' + 'flare'),
            ('cloud' + 'flared'),
            ('cf' + 'argotunnel'),
            ('try' + 'cloud' + 'flare'),
            ('CLOUD' + 'FLARED'),
            ('TUNNEL_' + 'UUID'),
            ('TUNNEL_' + 'ID_FILE')
          )
          $tracked = git ls-files | Where-Object {
            $_ -notmatch '(^|/)\.git/' -and
            (Test-Path -LiteralPath $_)
          }
          $matches = Select-String -Path $tracked -Pattern $legacyTerms -SimpleMatch -ErrorAction SilentlyContinue
          if ($matches) {
            $matches | ForEach-Object { $_.ToString() }
            throw "Legacy internet-access provider residue detected."
          }
          if (Test-Path -LiteralPath "bin") {
            throw "The provider binary directory must not exist."
          }
