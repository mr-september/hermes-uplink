name: Update Cloudflared Binary Pin

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: update-cloudflared
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cloudflared:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Fetch and hash latest release
        id: fetch_release
        shell: bash
        run: |
          set -euo pipefail

          release_json="$(curl --fail --silent --show-error --location --retry 3 \
            --proto '=https' --proto-redir '=https' --tlsv1.2 \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -H 'User-Agent: hermes-uplink-cloudflared-updater' \
            'https://api.github.com/repos/cloudflare/cloudflared/releases/latest')"
          latest_tag="$(jq -er '.tag_name | select(test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$"))' <<<"$release_json")"
          version="${latest_tag#v}"
          download_url="https://github.com/cloudflare/cloudflared/releases/download/${latest_tag}/cloudflared-windows-amd64.exe"

          curl --fail --silent --show-error --location --retry 3 \
            --proto '=https' --proto-redir '=https' --tlsv1.2 \
            -o cloudflared.exe "$download_url"
          test -s cloudflared.exe

          sha256="$(sha256sum cloudflared.exe | awk '{print toupper($1)}')"
          expected_sha256="$(jq -er '.body' <<<"$release_json" \
            | sed -nE 's/^[[:space:]]*cloudflared-windows-amd64\.exe:[[:space:]]*([0-9a-fA-F]{64})[[:space:]]*$/\1/p' \
            | head -n 1 \
            | tr '[:lower:]' '[:upper:]')"
          if [[ -z "$expected_sha256" || "$sha256" != "$expected_sha256" ]]; then
            echo "downloaded artifact checksum does not match Cloudflare's published checksum"
            echo "computed=$sha256 published=${expected_sha256:-missing}"
            exit 1
          fi
          rm -f cloudflared.exe

          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'sha256=%s\n' "$sha256" >> "$GITHUB_OUTPUT"

      - name: Update pin files
        env:
          VERSION: ${{ steps.fetch_release.outputs.version }}
          SHA256: ${{ steps.fetch_release.outputs.sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$VERSION" SHA256="$SHA256" python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          sha256 = os.environ["SHA256"]
          tunnel = Path("tunnel.bat")
          readme = Path("README.md")

          tunnel_text = tunnel.read_text(encoding="utf-8")
          tunnel_text, version_count = re.subn(
              r'(?m)^set "CLOUDFLARED_VERSION=.*"$',
              f'set "CLOUDFLARED_VERSION={version}"',
              tunnel_text,
          )
          tunnel_text, hash_count = re.subn(
              r'(?m)^set "CLOUDFLARED_SHA256=.*"$',
              f'set "CLOUDFLARED_SHA256={sha256}"',
              tunnel_text,
          )
          if (version_count, hash_count) != (1, 1):
              raise SystemExit("unexpected cloudflared pin layout in tunnel.bat")
          tunnel.write_text(tunnel_text, encoding="utf-8", newline="")

          readme_text = readme.read_text(encoding="utf-8")
          readme_text, readme_count = re.subn(
              r'(?m)(pins cloudflared `)[^`]+(`)',
              rf'\g<1>{version}\g<2>',
              readme_text,
          )
          if readme_count != 1:
              raise SystemExit("unexpected cloudflared version text in README.md")
          readme.write_text(readme_text, encoding="utf-8", newline="")
          PY
          git diff --check

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.fetch_release.outputs.version }}
          SHA256: ${{ steps.fetch_release.outputs.sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- tunnel.bat README.md; then
            echo "cloudflared pin is already current"
            exit 0
          fi

          branch="chore/update-cloudflared-${VERSION}"
          open_count="$(gh pr list --state open --head "$branch" --json number --jq 'length')"
          if [[ "$open_count" != "0" ]]; then
            echo "an update PR already exists for ${VERSION}"
            exit 0
          fi
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "remote branch ${branch} already exists; refusing to overwrite it"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add tunnel.bat README.md
          git commit -m "chore: update pinned cloudflared to ${VERSION}"
          git push --set-upstream origin "$branch"

          body="$(printf 'Automated pin update from the official GitHub release asset.\n\n- Version: %s\n- SHA-256: %s\n\nThe workflow also compared the downloaded artifact with Cloudflare\x27s published release checksum. Review release provenance before merging.' "$VERSION" "$SHA256")"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Update pinned cloudflared to ${VERSION}" \
            --body "$body"
